[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "flurry-monitor"
version = "0.0.1"
description = "Monitoring and observability for Flurry Code"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "dimaburger" },
]
keywords = ["monitoring", "observability", "flurry", "ai-agents"]
classifiers = [
    "Development Status :: 1 - Planning",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: System :: Monitoring",
]

dependencies = []

[project.urls]
Homepage = "https://github.com/deepburger/flurry-code"
Repository = "https://github.com/deepburger/flurry-code"
Issues = "https://github.com/deepburger/flurry-code/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/flurry"]
